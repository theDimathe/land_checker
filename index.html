<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Control Room</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #121a30;
        --muted: #95a2c6;
        --text: #e8ecff;
        --ok: #20d67b;
        --warn: #ffb84d;
        --bad: #ff6b78;
        --line: #23304d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(180deg, #0a0f1d, #0c1324);
        color: var(--text);
      }
      .layout {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 { margin: 0; font-size: 28px; }
      .sub { color: var(--muted); margin-top: 6px; }
      .toolbar {
        margin: 16px 0 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 10px;
        padding: 9px 12px;
        min-width: 250px;
      }
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 12px;
        color: var(--muted);
      }
      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(18, 26, 48, 0.72);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1300px;
      }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }
      th {
        position: sticky;
        top: 0;
        background: #121a30;
        z-index: 1;
        color: #c9d2f0;
        font-size: 13px;
      }
      tr:hover td { background: rgba(255, 255, 255, 0.02); }
      .preview {
        width: 270px;
        height: 152px;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: #070b15;
      }
      .preview iframe {
        width: 1366px;
        height: 768px;
        border: 0;
        transform: scale(0.198);
        transform-origin: top left;
        pointer-events: none;
      }
      .lamp { font-size: 18px; }
      .ok { color: var(--ok); }
      .bad { color: var(--bad); }
      .warn { color: var(--warn); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      a {
        color: #92c8ff;
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      .small { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <main class="layout">
      <h1>Landing Control Room</h1>
      <p class="sub">Быстрый мониторинг всех папок-лендингов: превью, дата изменений, трекинг и техсводка.</p>

      <div class="toolbar">
        <input id="search" placeholder="Поиск по названию папки" />
        <span id="summary" class="pill">Загрузка...</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Папка</th>
              <th>Превью первого экрана</th>
              <th>Обновлено</th>
              <th>Файлы/размер</th>
              <th>Формы</th>
              <th>Скрипты</th>
              <th>Адаптив</th>
              <th>Title</th>
              <th>Метрика</th>
              <th>FB Pixel</th>
              <th>GTM</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>

    <script>
      const rowsEl = document.getElementById('rows');
      const searchEl = document.getElementById('search');
      const summaryEl = document.getElementById('summary');
      let data = [];

      const lamp = (on) => `<span class="lamp ${on ? 'ok' : 'bad'}">●</span>`;
      const boolTag = (on) => `<span class="${on ? 'ok' : 'warn'}">${on ? 'Да' : 'Нет'}</span>`;

      function formatDate(iso) {
        if (!iso) return '<span class="warn">Нет данных</span>';
        return new Date(iso).toLocaleString('ru-RU');
      }

      function render(list) {
        rowsEl.innerHTML = list
          .map((item, index) => {
            const preview = item.hasIndex
              ? `<div class="preview"><iframe loading="lazy" src="${item.previewUrl}"></iframe></div>`
              : '<span class="warn">index.html отсутствует</span>';

            return `
              <tr>
                <td>${index + 1}</td>
                <td class="mono">${item.folderName}</td>
                <td>${preview}</td>
                <td>${formatDate(item.updatedAt)}</td>
                <td>${item.files} / ${item.size}</td>
                <td>${item.quick.forms}</td>
                <td>${item.quick.externalScripts}</td>
                <td>${boolTag(item.quick.hasViewport)}</td>
                <td>${boolTag(item.quick.hasTitle)}</td>
                <td>${lamp(item.tracking.yandexMetrika)}</td>
                <td>${lamp(item.tracking.facebookPixel)}</td>
                <td>${lamp(item.tracking.googleTagManager)}</td>
                <td>
                  <a href="${item.openUrl}" target="_blank" rel="noreferrer">Открыть</a><br />
                  <span class="small">${item.hasIndex ? 'Готов к просмотру' : 'Проверьте структуру'}</span>
                </td>
              </tr>
            `;
          })
          .join('');

        summaryEl.textContent = `Сайтов: ${list.length}`;
      }

      searchEl.addEventListener('input', () => {
        const query = searchEl.value.trim().toLowerCase();
        if (!query) return render(data);
        render(data.filter((item) => item.folderName.toLowerCase().includes(query)));
      });

      fetch('/api/landings')
        .then((r) => r.json())
        .then((payload) => {
          data = payload.landings;
          render(data);
        })
        .catch((error) => {
          rowsEl.innerHTML = `<tr><td colspan="13" class="bad">Ошибка загрузки: ${error}</td></tr>`;
          summaryEl.textContent = 'Ошибка загрузки';
        });
    </script>
  </body>
</html>
