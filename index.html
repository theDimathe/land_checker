<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Control Room</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #121a30;
        --muted: #95a2c6;
        --text: #e8ecff;
        --ok: #20d67b;
        --warn: #ffb84d;
        --bad: #ff6b78;
        --line: #23304d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(180deg, #0a0f1d, #0c1324);
        color: var(--text);
      }
      .layout {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 { margin: 0; font-size: 28px; }
      .sub { color: var(--muted); margin-top: 6px; }
      .toolbar {
        margin: 16px 0 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 10px;
        padding: 9px 12px;
        min-width: 250px;
      }
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 12px;
        color: var(--muted);
      }
      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(18, 26, 48, 0.72);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1300px;
      }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }
      th {
        position: sticky;
        top: 0;
        background: #121a30;
        z-index: 1;
        color: #c9d2f0;
        font-size: 13px;
      }
      tr:hover td { background: rgba(255, 255, 255, 0.02); }
      .preview {
        width: 270px;
        height: 152px;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: #070b15;
      }
      .preview iframe {
        width: 1366px;
        height: 768px;
        border: 0;
        transform: scale(0.198);
        transform-origin: top left;
        pointer-events: none;
      }
      .lamp { font-size: 18px; }
      .ok { color: var(--ok); }
      .bad { color: var(--bad); }
      .warn { color: var(--warn); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      a {
        color: #92c8ff;
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      .small { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <main class="layout">
      <h1>Landing Control Room</h1>
      <p class="sub">Быстрый мониторинг всех папок-лендингов: превью, дата изменений и техсводка.</p>

      <div class="toolbar">
        <input id="search" placeholder="Поиск по названию папки" />
        <span id="summary" class="pill">Загрузка...</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Папка</th>
              <th>Превью первого экрана</th>
              <th>Обновлено</th>
              <th>Файлы/размер</th>
              <th>Адаптив</th>
              <th>Метрика</th>
              <th>FB Pixel</th>
              <th>GTM</th>
              <th>Сервисные страницы</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>

    <script>
      const rowsEl = document.getElementById('rows');
      const searchEl = document.getElementById('search');
      const summaryEl = document.getElementById('summary');
      let data = [];

      const lamp = (on) => `<span class="lamp ${on ? 'ok' : 'bad'}">●</span>`;
      const boolTag = (on) => `<span class="${on ? 'ok' : 'warn'}">${on ? 'Да' : 'Нет'}</span>`;

      function formatDate(iso) {
        if (!iso) return '<span class="warn">Нет данных</span>';
        return new Date(iso).toLocaleString('ru-RU');
      }

      function render(list) {
        rowsEl.innerHTML = list
          .map((item, index) => {
            const preview = item.hasIndex
              ? `<div class="preview"><iframe loading="lazy" src="${item.previewUrl}"></iframe></div>`
              : '<span class="warn">index.html отсутствует</span>';

            return `
              <tr>
                <td>${index + 1}</td>
                <td class="mono">${item.folderName}</td>
                <td>${preview}</td>
                <td>${formatDate(item.updatedAt)}</td>
                <td>${item.files} / ${item.size}</td>
                <td>${boolTag(item.quick.hasViewport)}</td>
                <td>${lamp(item.tracking.yandexMetrika)}</td>
                <td>${lamp(item.tracking.facebookPixel)}</td>
                <td>${lamp(item.tracking.googleTagManager)}</td>
                <td>${lamp(item.signals.servicePages)}</td>
                <td>
                  <a href="${item.openUrl}" target="_blank" rel="noreferrer">Открыть</a><br />
                  <span class="small">${item.hasIndex ? 'Готов к просмотру' : 'Проверьте структуру'}</span>
                </td>
              </tr>
            `;
          })
          .join('');

        summaryEl.textContent = `Сайтов: ${list.length}`;
      }

      searchEl.addEventListener('input', () => {
        const query = searchEl.value.trim().toLowerCase();
        if (!query) return render(data);
        render(data.filter((item) => item.folderName.toLowerCase().includes(query)));
      });

      const KB = 1024;
      const MB = KB * 1024;
      const SIGNAL_PATTERNS = {
        funnelScript: [/location\.search/i, /urlsearchparams/i, /[?&](utm_|sub|clickid|campaign|source)=/i, /quiz|funnel|step/i],
        funnelTracking: [/ym\([^)]*reachgoal/i, /fbq\(['"]track/i, /gtag\(['"]event/i, /datalayer\.push/i],
        paywall: [/paywall/i, /checkout/i, /payment/i, /credit\s*card/i, /paypal/i, /apple\s*pay/i, /google\s*pay/i],
        terms: [/terms\s*(and|&)\s*conditions/i, /terms\s*of\s*use/i, /услов(ия|иями)\s*использования/i],
        privacy: [/privacy\s*policy/i, /политик[аы]\s*конфиденциальности/i],
        confirmation: [/confirm/i, /success/i, /thank\s*you/i, /подтвержден/i, /подтверждени/i],
      };

      function formatBytes(bytes) {
        if (bytes >= MB) return `${(bytes / MB).toFixed(2)} MB`;
        if (bytes >= KB) return `${(bytes / KB).toFixed(1)} KB`;
        return `${bytes} B`;
      }

      function hasAnyPattern(content, patterns) {
        return patterns.some((pattern) => pattern.test(content));
      }

      function trackingFlags(content) {
        const lower = content.toLowerCase();
        return {
          yandexMetrika: /ym\(|mc\.yandex|metrika/i.test(content),
          facebookPixel: /fbq\(|connect\.facebook\.net|facebook pixel/i.test(content),
          googleTagManager: /gtm-|googletagmanager\.com/i.test(lower),
        };
      }

      function quickFlags(content) {
        const lower = content.toLowerCase();
        return {
          hasViewport: lower.includes('name="viewport"') || lower.includes("name='viewport'"),
        };
      }

      function signalFlags(files) {
        const joined = files.map((file) => file.content).join('\n');
        const paywallFiles = files.filter((file) => hasAnyPattern(file.content, SIGNAL_PATTERNS.paywall));
        return {
          funnelScript: hasAnyPattern(joined, SIGNAL_PATTERNS.funnelScript),
          funnelTracking: hasAnyPattern(joined, SIGNAL_PATTERNS.funnelTracking),
          paywall: paywallFiles.length > 0,
          paywallMetrika: paywallFiles.some((file) => /ym\(|mc\.yandex|metrika/i.test(file.content)),
          servicePages:
            hasAnyPattern(joined, SIGNAL_PATTERNS.terms) &&
            hasAnyPattern(joined, SIGNAL_PATTERNS.privacy) &&
            hasAnyPattern(joined, SIGNAL_PATTERNS.confirmation),
        };
      }

      function normalizePayload(landings) {
        return (landings || []).map((item) => ({
          ...item,
          quick: item.quick || { hasViewport: false },
          tracking: item.tracking || { yandexMetrika: false, facebookPixel: false, googleTagManager: false },
          signals: item.signals || {
            funnelScript: false,
            funnelTracking: false,
            paywall: false,
            paywallMetrika: false,
            servicePages: false,
          },
        }));
      }

      async function parseLocalApi() {
        const response = await fetch('./api/landings');
        const contentType = response.headers.get('content-type') || '';
        if (!response.ok || !contentType.includes('application/json')) {
          throw new Error('Локальный API недоступен в текущем окружении');
        }
        const payload = await response.json();
        return normalizePayload(payload.landings);
      }

      function getPagesContext() {
        const hostParts = window.location.hostname.split('.');
        const owner = hostParts[0];
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const repo = pathParts[0];
        if (!owner || !repo || !window.location.hostname.includes('github.io')) {
          return null;
        }
        return { owner, repo };
      }

      async function fetchRepoTree(owner, repo) {
        const apiHeaders = { Accept: 'application/vnd.github+json' };
        const repoResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}`, { headers: apiHeaders });
        if (!repoResponse.ok) {
          throw new Error(`GitHub API вернул ${repoResponse.status}`);
        }

        const repoInfo = await repoResponse.json();
        const branch = repoInfo.default_branch || 'main';
        const treeResponse = await fetch(
          `https://api.github.com/repos/${owner}/${repo}/git/trees/${encodeURIComponent(branch)}?recursive=1`,
          { headers: apiHeaders }
        );

        if (!treeResponse.ok) {
          throw new Error(`GitHub API вернул ${treeResponse.status}`);
        }

        const treePayload = await treeResponse.json();
        return Array.isArray(treePayload.tree) ? treePayload.tree : [];
      }

      async function parseGitHubPages() {
        const context = getPagesContext();
        if (!context) {
          throw new Error('GitHub Pages контекст не определён');
        }

        const { owner, repo } = context;
        const tree = await fetchRepoTree(owner, repo);
        const folderStats = new Map();

        for (const entry of tree) {
          if (entry.type !== 'blob' || !entry.path) continue;
          const [topFolder] = entry.path.split('/');
          if (!topFolder || topFolder.startsWith('.') || topFolder === 'node_modules') continue;

          const current = folderStats.get(topFolder) || { fileCount: 0, totalBytes: 0, textFiles: [] };
          current.fileCount += 1;
          current.totalBytes += Number(entry.size || 0);
          if (/\.(html?|js)$/i.test(entry.path)) {
            current.textFiles.push(entry.path);
          }
          folderStats.set(topFolder, current);
        }

        const folders = Array.from(folderStats.keys()).sort((a, b) => a.localeCompare(b));

        const landings = await Promise.all(
          folders.map(async (folderName) => {
            const openUrl = `./${folderName}/`;
            const previewUrl = `./${folderName}/index.html`;
            let html = '';
            let hasIndex = false;

            try {
              const pageResponse = await fetch(previewUrl);
              if (pageResponse.ok) {
                html = await pageResponse.text();
                hasIndex = true;
              }
            } catch (_) {
              // ignore per-folder fetch errors
            }

            const stats = folderStats.get(folderName) || { fileCount: 0, totalBytes: 0 };
            const filesForSignals = [{ name: 'index.html', content: html }];
            const quick = quickFlags(html);
            const tracking = trackingFlags(html);
            const signals = signalFlags(filesForSignals);

            return {
              folderName,
              previewUrl,
              openUrl,
              hasIndex,
              updatedAt: null,
              files: stats.fileCount || (hasIndex ? 1 : 0),
              size: formatBytes(stats.totalBytes || new Blob(filesForSignals.map((file) => file.content)).size),
              quick,
              tracking,
              signals,
            };
          })
        );

        return normalizePayload(landings);
      }


      async function parseStaticManifest() {
        const response = await fetch('./landings-manifest.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Статический манифест недоступен (${response.status})`);
        }
        const payload = await response.json();
        const landings = normalizePayload(payload.landings).map((item) => ({
          ...item,
          updatedAt: item.updatedAt || payload.generatedAt || null,
        }));
        if (!landings.length) {
          throw new Error('Статический манифест пуст');
        }
        return landings;
      }

      (async () => {
        try {
          data = await parseLocalApi();
          render(data);
          return;
        } catch (_) {
          // fallback to static mode for GitHub Pages
        }

        try {
          data = await parseStaticManifest();
          render(data);
          summaryEl.textContent = `Сайтов: ${data.length} (статический режим)`;
          return;
        } catch (_) {
          // fallback to GitHub API when manifest is missing
        }

        try {
          data = await parseGitHubPages();
          render(data);
          summaryEl.textContent = `Сайтов: ${data.length} (GitHub Pages режим)`;
        } catch (error) {
          rowsEl.innerHTML = `<tr><td colspan="11" class="bad">Ошибка загрузки: ${error.message || error}</td></tr>`;
          summaryEl.textContent = 'Ошибка загрузки';
        }
      })();
    </script>
  </body>
</html>
